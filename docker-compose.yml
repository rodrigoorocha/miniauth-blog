services:
  postgres:
    image: postgres:16-alpine
    container_name: miniauth-postgres
    environment:
      POSTGRES_USER: miniauth
      POSTGRES_PASSWORD: miniauth123
      POSTGRES_DB: miniauth_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U miniauth"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: miniauth-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: miniauth-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: miniauth
      RABBITMQ_DEFAULT_PASS: miniauth123
    ports:
      - "5672:5672"    # AMQP protocol (app connects here)
      - "15672:15672"  # Management UI (browser)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 10s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: miniauth-mailhog
    ports:
      - "1025:1025"  # SMTP (app sends emails here)
      - "8025:8025"  # Web UI (browser — see received emails)

volumes:
  postgres_data:
